
<!DOCTYPE html>
<html>
<head>
<title>MovieBot AI</title>

<style>
body { margin:0; background:#0b0f1a; color:white; font-family:sans-serif; }
.glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border:1px solid rgba(255,255,255,0.2); }
.navbar { padding:15px; text-align:center; font-size:24px; color:red; position:relative; }
.profile { position:absolute; right:20px; top:15px; }
#profileMenu { display:none; background:#222; padding:10px; border-radius:10px; }

input { padding:10px; border-radius:20px; border:none; background: rgba(255,255,255,0.1); color:white; width:250px;}
button { padding:10px; border:none; border-radius:20px; background:red; color:white; cursor:pointer; }

.chat { height:40vh; overflow-y:auto; padding:20px; }
.msg { margin:10px; padding:10px; border-radius:10px; max-width:70%; }
.user { background:#2563eb; margin-left:auto; }
.bot { background:#1e293b; }

.row { padding:20px; }
.movies { display:flex; overflow-x:auto; gap:10px; }

.card { min-width:150px; transition:0.3s; cursor:pointer; text-align:center; }
.card:hover { transform: scale(1.15); }
.card img { width:100%; border-radius:10px; }

.title { font-size:14px; margin-top:5px; }
.rating { font-size:12px; color:gold; }

#loginModal { display:none; position:fixed; width:100%; height:100%; background:rgba(0,0,0,0.8); }
.modal-box { padding:30px; width:300px; margin:120px auto; border-radius:10px; text-align:center; }
</style>
</head>

<body>

<div class="navbar glass">
🎬 MovieBot AI

<div class="profile">
<button onclick="toggleProfile()">👤</button>
<div id="profileMenu">
<p id="profileName">Guest</p>
<button onclick="openLogin()">Login / Signup</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div>
<input id="input" placeholder="Search movies like 'Inception' or 'Tamil action movies'" onkeypress="if(event.key==='Enter') send()">
<button onclick="send()">🔍</button>
</div>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal">
<div class="modal-box glass">
<h3>Login</h3>
<input id="username" placeholder="Username"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button><br><br>
<button onclick="closeLogin()">Close</button>
</div>
</div>

<div class="chat" id="chat"></div>

<div class="row"><h3>🔥 Trending</h3><div class="movies" id="trending"></div></div>
<div class="row"><h3>🎭 Action</h3><div id="actionRow" class="movies"></div></div>
<div class="row"><h3>😂 Comedy</h3><div id="comedyRow" class="movies"></div></div>
<div class="row"><h3>😱 Horror</h3><div id="horrorRow" class="movies"></div></div>
<div class="row"><h3>🎬 Thriller</h3><div id="thrillerRow" class="movies"></div></div>

<script>

// PROFILE
function toggleProfile(){
let m=document.getElementById("profileMenu");
m.style.display=m.style.display==="block"?"none":"block";
}
function openLogin(){loginModal.style.display="block";}
function closeLogin(){loginModal.style.display="none";}

function logout(){
localStorage.clear();
document.getElementById("profileName").innerText="Guest";
alert("Logged out");
}

// ---------------- LOGIN / SIGNUP ----------------
function signup(){
let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

fetch("/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})
.then(res=>res.json())
.then(data=>{
if(data.status==="created"){
alert("Signup successful ✅");
closeLogin();
}else{
alert("User already exists ❌");
}
});
}

function login(){
let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})
.then(res=>res.json())
.then(data=>{
if(data.status==="success"){
alert("Login successful ✅");

localStorage.setItem("user_id",data.user_id);
localStorage.setItem("username",username);

document.getElementById("profileName").innerText = username;

closeLogin();
}else{
alert("Invalid login ❌");
}
});
}

// ---------------- CHAT ----------------
function send(){
let input=document.getElementById("input").value.trim();
if(!input) return;

let chat=document.getElementById("chat");
document.getElementById("input").value="";

chat.innerHTML+=`<div class="msg user">${input}</div>`;
chat.innerHTML+=`<div class="msg bot" id="loading">🔍 Searching...</div>`;

fetch("/get_movies",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
input:input,
user_id:localStorage.getItem("user_id")
})
})
.then(r=>r.json())
.then(data=>{
let bot=document.getElementById("loading");

if(!data.length){
bot.innerText="No results found ❌";
return;
}

let html="<div class='movies'>";
data.forEach(m=>{
html+=`
<div class="card" onclick="openTrailer('${m.title}')">
<img src="${m.poster}">
<div class="title">${m.title}</div>
<div class="rating">⭐ ${m.rating}</div>
</div>`;
});
html+="</div>";

bot.innerHTML=html;
});
}

function openTrailer(t){
window.open(`https://www.youtube.com/results?search_query=${t} official trailer`);
}

// ---------------- LOAD ROWS ----------------
function loadRow(q,id){
fetch("/get_movies",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({input:q})
})
.then(r=>r.json())
.then(d=>{
let div=document.getElementById(id);
div.innerHTML=""; // clear before load

d.forEach(m=>{
div.innerHTML+=`
<div class="card" onclick="openTrailer('${m.title}')">
<img src="${m.poster}">
<div class="title">${m.title}</div>
</div>`;
});
});
}

loadRow("trending","trending");
loadRow("action movies","actionRow");
loadRow("comedy movies","comedyRow");
loadRow("horror movies","horrorRow");
loadRow("thriller movies","thrillerRow");

// ---------------- AUTO LOGIN ----------------
window.onload = function(){
let username = localStorage.getItem("username");
if(username){
document.getElementById("profileName").innerText = username;
}
}
</script>

</body>
</html>
